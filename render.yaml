services:
  - type: web
    name: nutrient-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: USDA_API_KEY
        sync: false  # Renderダッシュボードで設定
      - key: CORS_ORIGIN
        sync: false  # Renderダッシュボードで設定
