version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrient-db
    environment:
      POSTGRES_USER: nutrient_user
      POSTGRES_PASSWORD: nutrient_pass
      POSTGRES_DB: nutrient_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrient_user -d nutrient_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrient-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nutrient_user:nutrient_pass@postgres:5432/nutrient_db
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
